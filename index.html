"<!DOCTYPE html>
<html lang=\"en\" class=\"dark\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>Astro Veda - Premium Astrology</title>
    <script src=\"https://cdn.tailwindcss.com\"></script>
    <script src=\"https://unpkg.com/react@18/umd/react.production.min.js\" crossorigin></script>
    <script src=\"https://unpkg.com/react-dom@18/umd/react-dom.production.min.js\" crossorigin></script>
    <script src=\"https://unpkg.com/@babel/standalone/babel.min.js\"></script>
    <script type=\"text/javascript\" src=\"https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js\"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#000000',
                            card: '#0a0a0a',
                            cardBorder: '#1f1f1f',
                            accent: '#facc15',
                            text: '#ffffff',
                            muted: '#a1a1aa'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* GLOBAL STYLES */
        :root { color-scheme: dark; } 
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            position: relative;
        }

        /* ANIMATED COSMIC BACKGROUND */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #000000 0%, #0a0a1a 25%, #1a0a2e 50%, #0a0a1a 75%, #000000 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOATING STARS */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* SMOOTH ANIMATIONS */
        .glass-panel { 
            background: rgba(10, 10, 10, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(250, 204, 21, 0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel:hover {
            border-color: rgba(250, 204, 21, 0.3);
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.15);
            transform: translateY(-4px);
        }

        .fade-in { 
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; 
        }

        .slide-up { 
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; 
        }

        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }

        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* GLOW EFFECTS */
        .glow-accent {
            box-shadow: 0 0 30px rgba(250, 204, 21, 0.2);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glow-accent:hover {
            box-shadow: 0 0 50px rgba(250, 204, 21, 0.4);
            transform: scale(1.02);
        }

        /* BUTTON ENHANCEMENTS */
        .btn-primary {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-primary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(250, 204, 21, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; transition: background 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: #facc15; }

        /* Calendar Picker */
        input[type=\"date\"]::-webkit-calendar-picker-indicator,
        input[type=\"time\"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        /* CARD HOVER EFFECTS */
        .feature-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
        }

        .feature-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .feature-card:hover {
            transform: translateY(-8px);
        }

        .feature-card:hover .feature-icon {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
        }

        .feature-icon {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* MODAL BACKDROP */
        .modal-backdrop {
            backdrop-filter: blur(12px);
            animation: fadeIn 0.4s ease-out;
        }

        /* PRICE PULSE */
        @keyframes pricePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .price-animate {
            animation: pricePulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- Stars Container -->
    <div class=\"stars\" id=\"starsContainer\"></div>
    
    <div id=\"root\"></div>

    <script type=\"text/babel\">
        const { useState, useEffect } = React;

        // Generate Stars
        useEffect(() => {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }, []);

        // --- EMAILJS INITIALIZATION ---
        emailjs.init(\"8r2tapCdRmVdIbFQb\"); 

        function App() {
            const [view, setView] = useState('client');
            const [isBooking, setIsBooking] = useState(false);
            
            // Client States
            const [step, setStep] = useState(1); 
            const [email, setEmail] = useState('');
            const [generatedOtp, setGeneratedOtp] = useState('');
            const [userOtp, setUserOtp] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [isSending, setIsSending] = useState(false);
            const [date, setDate] = useState('');
            const [phone, setPhone] = useState('');
            const [txid, setTxid] = useState('');

            const today = new Date().toISOString().split('T')[0];
            const appointmentTime = '9:30 PM'; // Fixed time for all appointments

            // Admin States
            const [adminId, setAdminId] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [appointments, setAppointments] = useState([
                { id: 'ORD-1029', email: 'user@example.com', phone: '9876543210', date: '2026-03-01', time: '9:30 PM', txid: 'UPI123456789', status: 'Pending' }
            ]);

            // Intersection Observer for Feature Cards
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.1 });

                document.querySelectorAll('.feature-card').forEach(card => {
                    observer.observe(card);
                });

                return () => observer.disconnect();
            }, [view]);

            // --- OTP LOGIC ---
            const handleSendOTP = async (e) => {
                e.preventDefault();
                
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if(!email || !emailRegex.test(email)) {
                    return alert(\"Please enter a valid and correct email address.\");
                }
                
                setIsSending(true);
                const newOtp = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedOtp(newOtp);
                
                try {
                    await emailjs.send(\"service_z2jyz5c\", \"template_hod7wir\", {
                        to_email: email,
                        otp_code: newOtp,
                    });
                    
                    setOtpSent(true);
                    setIsSending(false);
                    setTimeout(() => alert(\"Success! A verification code was sent to \" + email), 200);

                } catch (err) {
                    console.error(\"EMAILJS ERROR:\", err);
                    setIsSending(false);
                    alert(\"Failed to send the verification code. Please ensure you entered a real email address and try again.\");
                }
            };

            const handleVerifyOTP = (e) => {
                e.preventDefault();
                if (userOtp === generatedOtp) {
                    setStep(2);
                } else {
                    alert(\"Incorrect Verification Code. Please try again.\");
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminId === 'PrathamBAFNA123' && adminPass === '123tham') {
                    setIsAdminLoggedIn(true);
                } else {
                    alert('Invalid Admin Credentials');
                }
            };

            // --- UI COMPONENTS ---
            const renderNavbar = () => (
                <nav className=\"flex items-center justify-between p-4 md:p-6 max-w-7xl mx-auto w-full relative z-10\">
                    <div className=\"flex items-center gap-3 cursor-pointer select-none\" onDoubleClick={() => setView('admin')} onClick={() => {setIsBooking(false); setView('client');}}>
                        <div className=\"w-8 h-8 bg-white rounded-md flex items-center justify-center text-black font-bold text-xl\">
                            🪐
                        </div>
                        <span className=\"text-xl font-bold tracking-tight text-white\">Astro<span className=\"text-brand-muted\">Veda</span></span>
                    </div>
                    <div className=\"hidden md:flex items-center gap-8 text-sm font-medium text-brand-muted\">
                        <a href=\"#\" className=\"text-white transition-all duration-300 hover:text-brand-accent\">Home</a>
                        <a href=\"#\" className=\"hover:text-white transition-all duration-300\">Support</a>
                    </div>
                </nav>
            );

            const renderBookingModal = () => (
                <div className=\"fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 modal-backdrop fade-in\">
                    <div className=\"bg-[#0a0a0a] border border-[#1f1f1f] rounded-2xl w-full max-w-lg overflow-y-auto max-h-[90vh] shadow-2xl slide-up\">
                        <div className=\"p-5 md:p-6 border-b border-[#1f1f1f] flex justify-between items-center bg-[#050505] sticky top-0 z-20\">
                            <div>
                                <h2 className=\"text-lg md:text-xl font-bold text-white\">Book Appointment</h2>
                                <p className=\"text-xs md:text-sm text-brand-muted mt-1\">Step {step} of 3</p>
                            </div>
                            <button onClick={() => setIsBooking(false)} className=\"text-brand-muted hover:text-white p-1 transition-all duration-300 hover:rotate-90\">
                                <svg className=\"w-6 h-6\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth=\"2\" d=\"M6 18L18 6M6 6l12 12\"></path></svg>
                            </button>
                        </div>

                        <div className=\"p-5 md:p-8\">
                            {/* STEP 1: OTP */}
                            {step === 1 && (
                                <form onSubmit={otpSent ? handleVerifyOTP : handleSendOTP} className=\"space-y-4 md:space-y-5 fade-in\">
                                    <div>
                                        <label className=\"block text-xs md:text-sm font-medium text-brand-muted mb-2\">Email Address</label>
                                        <input type=\"email\" required value={email} onChange={(e)=>setEmail(e.target.value)} disabled={otpSent || isSending} className=\"w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-sm md:text-base text-white focus:outline-none focus:border-brand-accent transition-all duration-300 disabled:opacity-50\" placeholder=\"Enter your email\" />
                                    </div>
                                    {otpSent && (
                                        <div className=\"fade-in\">
                                            <label className=\"block text-xs md:text-sm font-medium text-brand-muted mb-2\">6-Digit Verification Code</label>
                                            <input type=\"text\" required maxLength=\"6\" value={userOtp} onChange={(e)=>setUserOtp(e.target.value)} className=\"w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-lg md:text-xl text-white focus:outline-none focus:border-brand-accent transition-all duration-300 text-center tracking-widest\" placeholder=\"••••••\" />
                                        </div>
                                    )}
                                    <button type=\"submit\" disabled={isSending} className=\"w-full py-3 md:py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 btn-primary text-sm md:text-base disabled:opacity-70\">
                                        {isSending ? \"Sending...\" : (otpSent ? \"Verify & Continue\" : \"Send Verification Code\")}
                                    </button>
                                </form>
                            )}

                            {/* STEP 2: SCHEDULE */}
                            {step === 2 && (
                                <div className=\"space-y-4 md:space-y-5 fade-in\">
                                    <div>
                                        <label className=\"block text-xs md:text-sm font-medium text-brand-muted mb-2\">Select Date</label>
                                        <input type=\"date\" min={today} required value={date} onChange={(e)=>setDate(e.target.value)} className=\"w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-sm md:text-base text-white focus:outline-none focus:border-brand-accent transition-all duration-300\" />
                                    </div>
                                    <div>
                                        <label className=\"block text-xs md:text-sm font-medium text-brand-muted mb-2\">Appointment Time</label>
                                        <div className=\"w-full bg-[#111] border border-brand-accent rounded-xl p-3 md:p-4 text-sm md:text-base text-white flex items-center justify-between\">
                                            <span className=\"font-bold text-brand-accent\">🕘 {appointmentTime}</span>
                                            <span className=\"text-xs text-brand-muted\">Fixed Time Slot</span>
                                        </div>
                                        <p className=\"text-xs text-brand-accent mt-2 flex items-start gap-1\">
                                            <span className=\"text-sm\">⏳</span> 
                                            <span><strong>Note:</strong> Every consultation call lasts a maximum of 40 minutes.</span>
                                        </p>
                                    </div>
                                    <div className=\"flex gap-3 md:gap-4 pt-2\">
                                        <button type=\"button\" onClick={() => setStep(1)} className=\"w-1/3 py-3 md:py-4 bg-[#111] border border-[#222] text-white font-bold rounded-xl hover:bg-[#222] transition-all duration-300 text-sm md:text-base\">Back</button>
                                        <button type=\"button\" onClick={() => { if(date) setStep(3); else alert('Please select a date.'); }} className=\"w-2/3 py-3 md:py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 btn-primary text-sm md:text-base\">Proceed to Pay</button>
                                    </div>
                                </div>
                            )}

                            {/* STEP 3: PAYMENT */}
                            {step === 3 && (
                                <form onSubmit={(e) => { e.preventDefault(); alert('Order Placed! Admin will review your payment.'); setIsBooking(false); setStep(1); }} className=\"space-y-4 md:space-y-5 fade-in\">
                                    
                                    <div className=\"bg-[#111] p-3 md:p-4 rounded-xl border border-[#222] flex items-center justify-between glow-accent\">
                                        <span className=\"text-xs md:text-sm text-brand-muted\">Total Amount</span>
                                        <span className=\"text-xl md:text-2xl font-bold text-brand-accent price-animate\">₹2000</span>
                                    </div>

                                    <div className=\"text-center py-2 md:py-4\">
                                        <div className=\"w-28 h-28 md:w-32 md:h-32 bg-white mx-auto rounded-xl flex items-center justify-center text-black font-bold mb-2 md:mb-3 border-4 border-brand-accent glow-accent\">
                                            QR CODE
                                        </div>
                                        <p className=\"text-xs md:text-sm font-bold text-brand-accent\">UPI: astroveda@ybl</p>
                                    </div>

                                    <div>
                                        <label className=\"block text-xs md:text-sm font-medium text-brand-muted mb-2\">WhatsApp / Contact Number</label>
                                        <div className=\"flex\">
                                            <span className=\"bg-[#111] border border-[#222] border-r-0 rounded-l-xl p-3 md:p-4 text-sm md:text-base text-brand-muted\">+91</span>
                                            <input type=\"tel\" pattern=\"[0-9]{10}\" maxLength=\"10\" required value={phone} onChange={(e)=>setPhone(e.target.value)} className=\"w-full bg-[#111] border border-[#222] rounded-r-xl p-3 md:p-4 text-sm md:text-base text-white focus:outline-none focus:border-brand-accent transition-all duration-300\" placeholder=\"10-digit number\" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className=\"block text-xs md:text-sm font-medium text-brand-muted mb-2\">Transaction ID (TXID)</label>
                                        <input type=\"text\" required value={txid} onChange={(e)=>setTxid(e.target.value)} className=\"w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-sm md:text-base text-white focus:outline-none focus:border-brand-accent transition-all duration-300\" placeholder=\"Enter Reference ID\" />
                                    </div>

                                    <div>
                                        <label className=\"block text-xs md:text-sm font-medium text-brand-muted mb-2\">Upload Screenshot</label>
                                        <input type=\"file\" accept=\"image/*\" required className=\"w-full text-xs md:text-sm text-brand-muted file:mr-3 md:file:mr-4 file:py-2 md:file:py-3 file:px-3 md:file:px-4 file:rounded-xl file:border-0 file:text-xs md:file:text-sm file:font-bold file:bg-[#111] file:text-white hover:file:bg-[#222] file:cursor-pointer transition-all duration-300\" />
                                    </div>

                                    <div className=\"flex gap-3 md:gap-4 pt-2\">
                                        <button type=\"button\" onClick={() => setStep(2)} className=\"w-1/3 py-3 md:py-4 bg-[#111] border border-[#222] text-white font-bold rounded-xl hover:bg-[#222] transition-all duration-300 text-sm md:text-base\">Back</button>
                                        <button type=\"submit\" className=\"w-2/3 py-3 md:py-4 bg-brand-accent text-black font-bold rounded-xl hover:bg-yellow-400 btn-primary text-sm md:text-base\">Confirm Order</button>
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );

            // Client Landing Page
            const renderClient = () => (
                <div className=\"min-h-screen flex flex-col bg-brand-bg\">
                    {renderNavbar()}
                    
                    <main className=\"flex-grow flex flex-col items-center justify-start px-4 md:px-6 py-8 md:py-12 w-full max-w-7xl mx-auto relative z-10\">
                        <div className=\"text-center w-full max-w-4xl mx-auto mb-12 md:mb-16 slide-up\">
                            <div className=\"flex flex-wrap items-center justify-center gap-2 md:gap-3 mb-6 md:mb-8\">
                                <span className=\"rounded-full bg-[#111] border border-[#222] px-3 py-1.5 text-[10px] md:text-xs font-medium text-brand-muted flex items-center gap-2 glass-panel\">
                                    <span className=\"w-2 h-2 rounded-full bg-green-500\"></span> 5000+ Happy Customers
                                </span>
                                <span className=\"rounded-full bg-[#111] border border-[#222] px-3 py-1.5 text-[10px] md:text-xs font-medium text-brand-muted flex items-center gap-2 glass-panel\">
                                    ⭐ 30+ Years Experience
                                </span>
                            </div>
                            
                            <h1 className=\"text-4xl md:text-7xl font-black text-white tracking-tight mb-4 md:mb-6 leading-tight\">
                                Accurate <span className=\"text-brand-accent\">Astrology</span>
                            </h1>
                            <p className=\"text-base md:text-xl text-brand-muted max-w-2xl mx-auto mb-8 md:mb-10 px-2\">
                                Instant clarity and guidance. A unique and highly accurate method of analysis differing from traditional approaches.
                            </p>
                            
                            <div className=\"text-center w-full mt-10 md:mt-16 flex flex-col items-center\">
                                <h2 className=\"text-2xl md:text-3xl font-bold mb-2\">Current Exclusive Deal</h2>
                                <p className=\"text-sm md:text-base text-brand-muted mb-6 md:mb-8\">Limited time offer. Price in INR.</p>
                                
                                <div className=\"w-full max-w-md px-2\">
                                    <div className=\"bg-[#0a0a0a] border border-[#222] rounded-3xl p-6 md:p-8 relative flex flex-col glass-panel glow-accent\">
                                        <div className=\"absolute top-0 right-6 md:right-8 bg-brand-accent text-black text-[10px] font-bold px-4 py-1.5 rounded-b-lg\">BEST SELLER</div>
                                        
                                        <div className=\"w-14 h-14 md:w-16 md:h-16 bg-[#111] rounded-2xl flex items-center justify-center text-brand-accent text-2xl md:text-3xl mb-6 mx-auto border border-[#222] feature-icon\">🪐</div>
                                        
                                        <div className=\"text-2xl md:text-3xl font-black text-white mb-2\">Full Reading</div>
                                        <div className=\"text-green-500 text-xs md:text-sm font-bold mb-6 flex items-center justify-center gap-1\">⚡ Priority Booking + Deep Analysis</div>

                                        <div className=\"text-center mb-8\">
                                            <div className=\"text-brand-muted line-through text-base md:text-lg font-bold mb-1\">₹2999</div>
                                            <div className=\"text-4xl md:text-5xl font-black text-brand-accent price-animate\">₹2000</div>
                                        </div>

                                        <button onClick={() => setIsBooking(true)} className=\"w-full bg-brand-accent text-black font-bold py-4 rounded-xl text-base md:text-lg btn-primary glow-accent\">Book Appointment Now</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className=\"w-full max-w-5xl border-t border-[#1f1f1f] pt-10 md:pt-12 mt-8 md:mt-12 grid grid-cols-1 md:grid-cols-3 gap-8 text-center pb-12 px-4\">
                            <div className=\"feature-card stagger-1\">
                                <div className=\"w-10 h-10 md:w-12 md:h-12 mx-auto border border-[#222] rounded-xl flex items-center justify-center mb-3 md:mb-4 text-brand-accent feature-icon\">⚡</div>
                                <h3 className=\"font-bold text-white mb-2\">Instant Confirmation</h3>
                                <p className=\"text-xs md:text-sm text-brand-muted\">Appointments are transferred to your dashboard within seconds.</p>
                            </div>
                            <div className=\"feature-card stagger-2\">
                                <div className=\"w-10 h-10 md:w-12 md:h-12 mx-auto border border-[#222] rounded-xl flex items-center justify-center mb-3 md:mb-4 text-brand-accent feature-icon\">🛡️</div>
                                <h3 className=\"font-bold text-white mb-2\">Secure & Safe</h3>
                                <p className=\"text-xs md:text-sm text-brand-muted\">Private and confidential. We only need your birth details.</p>
                            </div>
                            <div className=\"feature-card stagger-3\">
                                <div className=\"w-10 h-10 md:w-12 md:h-12 mx-auto border border-[#222] rounded-xl flex items-center justify-center mb-3 md:mb-4 text-brand-accent feature-icon\">⭐</div>
                                <h3 className=\"font-bold text-white mb-2\">Highly Accurate</h3>
                                <p className=\"text-xs md:text-sm text-brand-muted\">Enjoy our unique analysis method different from the rest.</p>
                            </div>
                        </div>
                    </main>
                    {isBooking && renderBookingModal()}
                </div>
            );

            // Admin Panel
            const renderAdmin = () => {
                if (!isAdminLoggedIn) {
                    return (
                        <div className=\"min-h-screen flex items-center justify-center bg-[#000] p-4 fade-in relative z-10\">
                            <form onSubmit={handleAdminLogin} className=\"bg-[#0a0a0a] border border-[#1f1f1f] p-6 md:p-8 rounded-2xl w-full max-w-md shadow-2xl glass-panel\">
                                <div className=\"w-14 h-14 md:w-16 md:h-16 bg-brand-accent rounded-xl flex items-center justify-center text-black font-bold text-2xl md:text-3xl mx-auto mb-4 md:mb-6 glow-accent\">🪐</div>
                                <h2 className=\"text-xl md:text-2xl font-bold text-white mb-2 text-center\">Admin Access</h2>
                                <p className=\"text-brand-muted text-center mb-6 md:mb-8 text-xs md:text-sm\">Enter credentials to view bookings.</p>
                                <div className=\"space-y-4\">
                                    <input type=\"text\" value={adminId} onChange={(e)=>setAdminId(e.target.value)} placeholder=\"Admin ID\" className=\"w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-sm md:text-base text-white focus:outline-none focus:border-brand-accent transition-all duration-300\" />
                                    <input type=\"password\" value={adminPass} onChange={(e)=>setAdminPass(e.target.value)} placeholder=\"Password\" className=\"w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-sm md:text-base text-white focus:outline-none focus:border-brand-accent transition-all duration-300\" />
                                    <button type=\"submit\" className=\"w-full py-3 md:py-4 bg-brand-accent text-black font-bold rounded-xl btn-primary glow-accent text-sm md:text-base\">Login to Dashboard</button>
                                    <button type=\"button\" onClick={() => setView('client')} className=\"w-full py-2 text-brand-muted hover:text-white text-xs md:text-sm transition-all duration-300\">Back to Home</button>
                                </div>
                            </form>
                        </div>
                    );
                }

                return (
                    <div className=\"min-h-screen bg-[#000] p-4 md:p-8 fade-in relative z-10\">
                        <div className=\"max-w-7xl mx-auto\">
                            <div className=\"flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 md:mb-8\">
                                <div>
                                    <h2 className=\"text-2xl md:text-3xl font-black text-white\">Dashboard</h2>
                                    <p className=\"text-sm text-brand-muted\">Manage appointments and payments.</p>
                                </div>
                                <button onClick={() => {setIsAdminLoggedIn(false); setView('client');}} className=\"px-4 py-2 bg-[#111] border border-[#222] text-white rounded-xl hover:bg-[#222] text-xs md:text-sm font-bold transition-all duration-300\">Log Out</button>
                            </div>
                            
                            <div className=\"bg-[#0a0a0a] rounded-2xl border border-[#1f1f1f] overflow-x-auto shadow-xl glass-panel\">
                                <table className=\"w-full text-left min-w-[800px]\">
                                    <thead>
                                        <tr className=\"bg-[#111] border-b border-[#222] text-brand-muted text-xs uppercase tracking-wider\">
                                            <th className=\"p-4 md:p-5 font-semibold\">Order ID</th>
                                            <th className=\"p-4 md:p-5 font-semibold\">Contact Details</th>
                                            <th className=\"p-4 md:p-5 font-semibold\">Date & Time</th>
                                            <th className=\"p-4 md:p-5 font-semibold\">Payment Info</th>
                                            <th className=\"p-4 md:p-5 font-semibold\">Status</th>
                                            <th className=\"p-4 md:p-5 font-semibold\">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className=\"text-xs md:text-sm\">
                                        {appointments.map((app) => (
                                            <tr key={app.id} className=\"border-b border-[#1f1f1f] last:border-0 hover:bg-[#111]/50 transition-all duration-300\">
                                                <td className=\"p-4 md:p-5 font-bold text-white\">{app.id}</td>
                                                <td className=\"p-4 md:p-5 text-brand-muted\">{app.email}<br/><span className=\"text-white\">+91 {app.phone}</span></td>
                                                <td className=\"p-4 md:p-5\">
                                                    <input type=\"date\" defaultValue={app.date} className=\"bg-[#111] border border-[#222] rounded px-2 py-1 md:px-3 md:py-1.5 mb-2 text-xs w-full text-white transition-all duration-300 focus:border-brand-accent\"/>
                                                    <div className=\"bg-[#111] border border-brand-accent rounded px-2 py-1 md:px-3 md:py-1.5 text-xs w-full text-brand-accent font-bold\">
                                                        {appointmentTime}
                                                    </div>
                                                </td>
                                                <td className=\"p-4 md:p-5 text-brand-muted\">{app.txid} <br/><a href=\"#\" className=\"text-brand-accent text-[10px] md:text-xs hover:underline mt-1 inline-block transition-all duration-300\">View Screenshot</a></td>
                                                <td className=\"p-4 md:p-5\">
                                                    <span className=\"px-2 md:px-3 py-1 rounded-full text-[9px] md:text-[10px] font-bold bg-yellow-500/10 text-brand-accent border border-yellow-500/20 uppercase tracking-wide\">
                                                        {app.status}
                                                    </span>
                                                </td>
                                                <td className=\"p-4 md:p-5\">
                                                    <div className=\"flex flex-col md:flex-row gap-2\">
                                                        <button className=\"px-3 py-1.5 bg-brand-accent text-black hover:bg-yellow-400 font-bold rounded-lg text-xs transition-all duration-300 glow-accent w-full md:w-auto\">Approve</button>
                                                        <button className=\"px-3 py-1.5 bg-[#222] text-white hover:bg-[#333] font-bold rounded-lg text-xs transition-all duration-300 w-full md:w-auto\">Reject</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            return view === 'client' ? renderClient() : renderAdmin();
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
