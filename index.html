<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Veda - Premium Astrology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#000000',
                            card: '#0a0a0a',
                            cardBorder: '#1f1f1f',
                            accent: '#facc15',
                            text: '#ffffff',
                            muted: '#a1a1aa'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root { color-scheme: dark; } 
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border: 1px solid #1f1f1f; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        emailjs.init("8r2tapCdRmVdIbFQb"); 

        function App() {
            const [view, setView] = useState('client');
            const [isBooking, setIsBooking] = useState(false);
            
            const [step, setStep] = useState(1); 
            const [email, setEmail] = useState('');
            const [generatedOtp, setGeneratedOtp] = useState('');
            const [userOtp, setUserOtp] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [isSending, setIsSending] = useState(false);
            const [date, setDate] = useState('');
            const [time, setTime] = useState('');
            const [phone, setPhone] = useState('');
            const [txid, setTxid] = useState('');

            const today = new Date().toISOString().split('T')[0];

            const [adminId, setAdminId] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [appointments, setAppointments] = useState([
                { id: 'ORD-1029', email: 'user@example.com', phone: '9876543210', date: '2026-03-01', time: '10:00 PM', txid: 'UPI123456789', status: 'Pending' }
            ]);

            const handleSendOTP = async (e) => {
                e.preventDefault();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if(!email || !emailRegex.test(email)) return alert("Please enter a valid email.");
                
                setIsSending(true);
                const newOtp = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedOtp(newOtp);
                
                try {
                    await emailjs.send("service_z2jyz5c", "template_hod7wir", {
                        to_email: email,
                        otp_code: newOtp,
                    });
                    setOtpSent(true);
                    setIsSending(false);
                } catch (err) {
                    setIsSending(false);
                    alert("Failed to send code. Try again.");
                }
            };

            const handleVerifyOTP = (e) => {
                e.preventDefault();
                if (userOtp === generatedOtp) setStep(2);
                else alert("Incorrect Code.");
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminId === 'Pratham@123' && adminPass === 'Pkjewellers15') setIsAdminLoggedIn(true);
                else alert('Invalid Admin Credentials');
            };

            const renderNavbar = () => (
                <nav className="flex items-center justify-between p-4 md:p-6 max-w-7xl mx-auto w-full relative z-10">
                    <div className="flex items-center gap-3 cursor-pointer select-none" onDoubleClick={() => setView('admin')} onClick={() => {setIsBooking(false); setView('client');}}>
                        <div className="w-8 h-8 bg-white rounded-md flex items-center justify-center text-black font-bold text-xl">🪐</div>
                        <span className="text-xl font-bold tracking-tight text-white">Astro<span className="text-brand-muted">Veda</span></span>
                    </div>
                </nav>
            );

            const renderBookingModal = () => (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm fade-in">
                    <div className="bg-[#0a0a0a] border border-[#1f1f1f] rounded-2xl w-full max-w-lg overflow-y-auto max-h-[90vh] shadow-2xl slide-up">
                        <div className="p-5 md:p-6 border-b border-[#1f1f1f] flex justify-between items-center bg-[#050505] sticky top-0 z-20">
                            <div>
                                <h2 className="text-lg md:text-xl font-bold text-white">Book Appointment</h2>
                                <p className="text-xs md:text-sm text-brand-muted mt-1">Step {step} of 3</p>
                            </div>
                            <button onClick={() => setIsBooking(false)} className="text-brand-muted hover:text-white p-1">✕</button>
                        </div>

                        <div className="p-5 md:p-8">
                            {step === 1 && (
                                <form onSubmit={otpSent ? handleVerifyOTP : handleSendOTP} className="space-y-4 md:space-y-5 fade-in">
                                    <div>
                                        <label className="block text-xs md:text-sm font-medium text-brand-muted mb-2">Email Address</label>
                                        <input type="email" required value={email} onChange={(e)=>setEmail(e.target.value)} disabled={otpSent || isSending} className="w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-white focus:border-brand-accent focus:outline-none" placeholder="Enter email" />
                                    </div>
                                    {otpSent && (
                                        <div className="fade-in">
                                            <label className="block text-xs md:text-sm font-medium text-brand-muted mb-2">6-Digit Code</label>
                                            <input type="text" required maxLength="6" value={userOtp} onChange={(e)=>setUserOtp(e.target.value)} className="w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-center tracking-widest text-xl text-white focus:outline-none focus:border-brand-accent" placeholder="••••••" />
                                        </div>
                                    )}
                                    <button type="submit" disabled={isSending} className="w-full py-3 md:py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition-colors">
                                        {isSending ? "Sending..." : (otpSent ? "Verify & Continue" : "Send Verification Code")}
                                    </button>
                                </form>
                            )}

                            {step === 2 && (
                                <div className="space-y-4 md:space-y-5 fade-in">
                                    <div>
                                        <label className="block text-xs md:text-sm font-medium text-brand-muted mb-2">Select Date</label>
                                        <input type="date" min={today} required value={date} onChange={(e)=>setDate(e.target.value)} className="w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-white focus:outline-none focus:border-brand-accent" />
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-medium text-brand-muted mb-2">Select Time Slot</label>
                                        <select required value={time} onChange={(e)=>setTime(e.target.value)} className="w-full bg-[#111] border border-[#222] rounded-xl p-3 md:p-4 text-white focus:outline-none focus:border-brand-accent">
                                            <option value="">Choose time slot...</option>
                                            <option value="08:00 PM">08:00 PM</option>
                                            <option value="09:00 PM">09:00 PM</option>
                                            <option value="10:00 PM">10:00 PM</option>
                                            <option value="11:00 PM">11:00 PM</option>
                                        </select>
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={() => setStep(1)} className="w-1/3 py-3 bg-[#111] border border-[#222] text-white font-bold rounded-xl">Back</button>
                                        <button onClick={() => { if(date && time) setStep(3); else alert('Select date/time'); }} className="w-2/3 py-3 bg-white text-black font-bold rounded-xl hover:bg-gray-200">Proceed to Pay</button>
                                    </div>
                                </div>
                            )}

                            {step === 3 && (
                                <form 
                                    action="https://formspree.io/f/mqegdrdo" 
                                    method="POST" 
                                    enctype="multipart/form-data" 
                                    className="space-y-4 md:space-y-5 fade-in"
                                >
                                    {/* Pass internal data to Formspree hidden fields */}
                                    <input type="hidden" name="email" value={email} />
                                    <input type="hidden" name="appointment_date" value={date} />
                                    <input type="hidden" name="appointment_time" value={time} />

                                    <div className="bg-[#111] p-4 rounded-xl border border-[#222] flex items-center justify-between">
                                        <span className="text-brand-muted">Total Amount</span>
                                        <span className="text-2xl font-bold text-brand-accent">₹499</span>
                                    </div>

                                    <div className="text-center py-2">
                                        {/* Update src with your actual QR image file name */}
                                        <img src="qr_code.png" alt="Payment QR" className="w-32 h-32 mx-auto rounded-xl border-4 border-brand-accent mb-2" />
                                        <p className="text-sm font-bold text-brand-accent">UPI: astroveda@ybl</p>
                                    </div>

                                    <div>
                                        <label className="block text-xs md:text-sm font-medium text-brand-muted mb-2">WhatsApp Number</label>
                                        <input type="tel" name="whatsapp" pattern="[0-9]{10}" required value={phone} onChange={(e)=>setPhone(e.target.value)} className="w-full bg-[#111] border border-[#222] rounded-xl p-3 text-white focus:border-brand-accent focus:outline-none" placeholder="10-digit number" />
                                    </div>

                                    <div>
                                        <label className="block text-xs md:text-sm font-medium text-brand-muted mb-2">Transaction ID (TXID)</label>
                                        <input type="text" name="txid" required value={txid} onChange={(e)=>setTxid(e.target.value)} className="w-full bg-[#111] border border-[#222] rounded-xl p-3 text-white focus:border-brand-accent focus:outline-none" placeholder="Reference ID" />
                                    </div>

                                    <div>
                                        <label className="block text-xs md:text-sm font-medium text-brand-muted mb-2">Upload Screenshot</label>
                                        <input type="file" name="upload" accept="image/*" required className="w-full text-xs text-brand-muted file:bg-[#222] file:text-white file:border-0 file:py-2 file:px-4 file:rounded-lg file:cursor-pointer" />
                                    </div>

                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setStep(2)} className="w-1/3 py-3 bg-[#111] border border-[#222] text-white font-bold rounded-xl">Back</button>
                                        <button type="submit" className="w-2/3 py-3 bg-brand-accent text-black font-bold rounded-xl hover:bg-yellow-400">Confirm Order</button>
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                </div>
            );

            const renderClient = () => (
                <div className="min-h-screen flex flex-col bg-brand-bg">
                    {renderNavbar()}
                    <main className="flex-grow flex flex-col items-center justify-start px-4 py-12 w-full max-w-7xl mx-auto relative z-10">
                        <div className="text-center w-full max-w-4xl mx-auto mb-16 slide-up">
                            <h1 className="text-4xl md:text-7xl font-black text-white tracking-tight mb-6 leading-tight">
                                Accurate <span className="text-brand-accent">Astrology</span>
                            </h1>
                            <p className="text-base md:text-xl text-brand-muted max-w-2xl mx-auto mb-10">
                                Instant clarity and guidance. Professional analysis for your future.
                            </p>
                            <div className="bg-[#0a0a0a] border border-[#222] rounded-3xl p-8 max-w-md mx-auto relative hover:border-brand-accent transition-colors shadow-lg">
                                <div className="text-4xl font-black text-brand-accent mb-4">₹499</div>
                                <button onClick={() => setIsBooking(true)} className="w-full bg-brand-accent text-black font-bold py-4 rounded-xl text-lg hover:bg-yellow-400 transition shadow-md">Book Appointment Now</button>
                            </div>
                        </div>
                    </main>
                    {isBooking && renderBookingModal()}
                </div>
            );

            const renderAdmin = () => {
                if (!isAdminLoggedIn) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-[#000] p-4 fade-in">
                            <form onSubmit={handleAdminLogin} className="bg-[#0a0a0a] border border-[#1f1f1f] p-8 rounded-2xl w-full max-w-md shadow-2xl">
                                <h2 className="text-2xl font-bold text-white mb-6 text-center">Admin Access</h2>
                                <div className="space-y-4">
                                    <input type="text" value={adminId} onChange={(e)=>setAdminId(e.target.value)} placeholder="Admin ID" className="w-full bg-[#111] border border-[#222] rounded-xl p-4 text-white focus:outline-none focus:border-brand-accent" />
                                    <input type="password" value={adminPass} onChange={(e)=>setAdminPass(e.target.value)} placeholder="Password" className="w-full bg-[#111] border border-[#222] rounded-xl p-4 text-white focus:outline-none focus:border-brand-accent" />
                                    <button type="submit" className="w-full py-4 bg-brand-accent text-black font-bold rounded-xl hover:bg-yellow-400">Login</button>
                                    <button type="button" onClick={() => setView('client')} className="w-full py-2 text-brand-muted hover:text-white text-xs">Back to Home</button>
                                </div>
                            </form>
                        </div>
                    );
                }
                return (
                    <div className="min-h-screen bg-[#000] p-8 fade-in">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-3xl font-black text-white">Dashboard</h2>
                                <button onClick={() => {setIsAdminLoggedIn(false); setView('client');}} className="px-4 py-2 bg-[#111] border border-[#222] text-white rounded-xl">Log Out</button>
                            </div>
                            <div className="bg-[#0a0a0a] rounded-2xl border border-[#1f1f1f] overflow-x-auto">
                                <table className="w-full text-left min-w-[800px]">
                                    <thead>
                                        <tr className="bg-[#111] border-b border-[#222] text-brand-muted text-xs uppercase">
                                            <th className="p-5">Order ID</th>
                                            <th className="p-5">Contact</th>
                                            <th className="p-5">Date/Time</th>
                                            <th className="p-5">TXID</th>
                                            <th className="p-5">Status</th>
                                            <th className="p-5">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-sm">
                                        {appointments.map((app) => (
                                            <tr key={app.id} className="border-b border-[#1f1f1f] hover:bg-[#111]/50 transition-colors">
                                                <td className="p-5 font-bold text-white">{app.id}</td>
                                                <td className="p-5 text-brand-muted">{app.email}<br/>{app.phone}</td>
                                                <td className="p-5 text-white">{app.date} | {app.time}</td>
                                                <td className="p-5 text-brand-accent">{app.txid}</td>
                                                <td className="p-5"><span className="px-3 py-1 rounded-full bg-yellow-500/10 text-brand-accent text-[10px] font-bold border border-yellow-500/20">{app.status}</span></td>
                                                <td className="p-5 flex gap-2">
                                                    <button className="px-3 py-1 bg-brand-accent text-black font-bold rounded-lg text-xs">Approve</button>
                                                    <button className="px-3 py-1 bg-[#222] text-white font-bold rounded-lg text-xs">Reject</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            return view === 'client' ? renderClient() : renderAdmin();
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
