<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Veda - Premium Astrology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#000000',
                            card: '#0a0a0a',
                            border: '#1f1f1f',
                            accent: '#facc15',
                            muted: '#a1a1aa'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(12px); border: 1px solid #1f1f1f; }
        .animate-smooth { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.6s ease-out forwards; }
        
        /* Disable styling for the date picker */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input:disabled { opacity: 0.5; cursor: not-allowed; border-color: #333 !important; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        emailjs.init("8r2tapCdRmVdIbFQb"); 

        function App() {
            const [view, setView] = useState('client');
            const [isBooking, setIsBooking] = useState(false);
            const [step, setStep] = useState(1);
            
            // Core States
            const [bookedDates, setBookedDates] = useState(['2026-04-14']); // Dates that are greyed out
            const [appointments, setAppointments] = useState([
                { id: 'AV-1002', email: 'example@mail.com', phone: '9123456780', date: '2026-04-14', status: 'Approved', txid: 'TXN88271' }
            ]);

            // Booking States
            const [email, setEmail] = useState('');
            const [phone, setPhone] = useState('');
            const [date, setDate] = useState('');
            const [txid, setTxid] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [generatedOtp, setGeneratedOtp] = useState('');
            const [userOtp, setUserOtp] = useState('');
            const [isSending, setIsSending] = useState(false);

            // Admin Login States
            const [adminId, setAdminId] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);

            const today = new Date().toISOString().split('T')[0];

            // --- ADMIN LOGIC ---
            const handleApprove = (id, selectedDate) => {
                setAppointments(appointments.map(app => app.id === id ? {...app, status: 'Approved'} : app));
                // Add to greyed out list
                if (!bookedDates.includes(selectedDate)) {
                    setBookedDates([...bookedDates, selectedDate]);
                }
                alert(`Appointment for ${selectedDate} Approved. This date is now locked.`);
            };

            const handleReject = (id) => {
                setAppointments(appointments.filter(app => app.id !== id));
            };

            // --- CLIENT LOGIC ---
            const handleSendOTP = async (e) => {
                e.preventDefault();
                setIsSending(true);
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedOtp(code);
                try {
                    await emailjs.send("service_z2jyz5c", "template_hod7wir", { to_email: email, otp_code: code });
                    setOtpSent(true);
                    setIsSending(false);
                } catch (err) {
                    alert("OTP Error.");
                    setIsSending(false);
                }
            };

            const finalizeBooking = () => {
                const newApp = {
                    id: 'AV-' + Math.floor(1000 + Math.random() * 9000),
                    email, phone, date, status: 'Pending', txid
                };
                setAppointments([newApp, ...appointments]);
                alert("Payment submitted! Once Admin approves, this date will be reserved for you.");
                setIsBooking(false);
                setStep(1);
                setEmail(''); setPhone(''); setTxid(''); setDate(''); setOtpSent(false);
            };

            // Validation for Date Selection
            const handleDateChange = (e) => {
                const val = e.target.value;
                if (bookedDates.includes(val)) {
                    alert("This date is already booked by another client. Please choose another date.");
                    setDate('');
                } else {
                    setDate(val);
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminId === 'PRATHAM003' && adminPass === 'Pkjewellers155') setIsAdminLoggedIn(true);
                else alert("Incorrect Credentials");
            };

            // --- COMPONENTS ---
            const Navbar = () => (
                <nav className="flex justify-between items-center p-6 max-w-7xl mx-auto w-full sticky top-0 z-40 bg-black/50 backdrop-blur-md">
                    <div className="flex items-center gap-2 cursor-pointer select-none" onDoubleClick={() => setView('admin')} onClick={() => setView('client')}>
                        <div className="w-9 h-9 bg-brand-accent rounded-lg flex items-center justify-center text-black text-xl shadow-[0_0_15px_rgba(250,204,21,0.4)]">🪐</div>
                        <span className="text-xl font-black tracking-tighter">ASTRO<span className="text-brand-muted">VEDA</span></span>
                    </div>
                </nav>
            );

            const BookingModal = () => (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
                    <div className="bg-brand-card border border-brand-border rounded-[2.5rem] w-full max-w-md overflow-hidden slide-up shadow-2xl">
                        <div className="p-6 border-b border-brand-border flex justify-between items-center bg-[#050505]">
                            <div>
                                <h2 className="text-lg font-bold">Booking Session</h2>
                                <p className="text-[10px] text-brand-muted tracking-widest uppercase">Step {step} of 4</p>
                            </div>
                            <button onClick={() => setIsBooking(false)} className="w-8 h-8 rounded-full bg-brand-border flex items-center justify-center text-xs">✕</button>
                        </div>

                        <div className="p-8">
                            {step === 1 && (
                                <form onSubmit={otpSent ? (e)=>{e.preventDefault(); if(userOtp===generatedOtp)setStep(2); else alert("Wrong OTP")} : handleSendOTP} className="space-y-4">
                                    <input type="email" required placeholder="Email Address" value={email} onChange={(e)=>setEmail(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl focus:border-brand-accent outline-none" disabled={otpSent}/>
                                    {otpSent && <input type="text" maxLength="6" placeholder="OTP Code" value={userOtp} onChange={(e)=>setUserOtp(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl text-center text-xl tracking-[0.5em] font-bold text-brand-accent"/>}
                                    <button className="w-full bg-white text-black font-black py-4 rounded-2xl transition-all hover:bg-brand-accent">
                                        {isSending ? "Processing..." : (otpSent ? "Continue" : "Send Verification Code")}
                                    </button>
                                </form>
                            )}

                            {step === 2 && (
                                <div className="space-y-6">
                                    <div className="p-4 bg-brand-accent/5 border border-brand-accent/20 rounded-2xl text-center">
                                        <p className="text-[10px] text-brand-accent font-bold uppercase tracking-tighter">Fixed Session Time</p>
                                        <p className="text-3xl font-black">09:30 PM</p>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs text-brand-muted px-2">Select Date (Greyed dates are booked)</label>
                                        <input type="date" min={today} required value={date} onChange={handleDateChange} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none"/>
                                    </div>
                                    <button onClick={()=>date ? setStep(3) : alert("Select a date")} className="w-full bg-white text-black font-black py-4 rounded-2xl">Confirm Schedule</button>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-5 text-center">
                                    <div className="bg-black border border-brand-border p-5 rounded-2xl">
                                        <p className="text-brand-muted text-xs uppercase mb-1">Fee: ₹2,000</p>
                                        <p className="text-xs font-bold text-brand-accent">UPI: astroveda@ybl</p>
                                    </div>
                                    <div className="w-36 h-36 bg-white mx-auto rounded-2xl flex items-center justify-center text-black text-[10px] font-bold">QR CODE</div>
                                    <input type="text" placeholder="Transaction ID (TXID)" value={txid} onChange={(e)=>setTxid(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none text-sm"/>
                                    <button onClick={()=>txid ? setStep(4) : alert("Enter TXID")} className="w-full bg-brand-accent text-black font-black py-4 rounded-2xl">Verify Payment</button>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-5">
                                    <div className="text-center">
                                        <h3 className="text-xl font-bold mb-2">Final Step!</h3>
                                        <p className="text-xs text-brand-muted">Provide your number so we can call you at 9:30 PM on your selected date.</p>
                                    </div>
                                    <div className="flex">
                                        <span className="bg-brand-border p-4 rounded-l-2xl text-brand-muted border border-r-0 border-brand-border">+91</span>
                                        <input type="tel" maxLength="10" placeholder="Number" value={phone} onChange={(e)=>setPhone(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-r-2xl outline-none font-bold"/>
                                    </div>
                                    <button onClick={() => phone.length === 10 ? finalizeBooking() : alert("Invalid number")} className="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-green-500">Book Session</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            if (view === 'admin') {
                return (
                    <div className="min-h-screen bg-[#050505] p-6 md:p-12">
                        {!isAdminLoggedIn ? (
                            <div className="max-w-md mx-auto mt-20 p-10 bg-brand-card border border-brand-border rounded-[2.5rem] slide-up shadow-2xl">
                                <h2 className="text-2xl font-black mb-6 text-center">Admin Login</h2>
                                <form onSubmit={handleAdminLogin} className="space-y-4">
                                    <input type="text" placeholder="ID" value={adminId} onChange={(e)=>setAdminId(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none"/>
                                    <input type="password" placeholder="Pass" value={adminPass} onChange={(e)=>setAdminPass(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none"/>
                                    <button className="w-full bg-brand-accent text-black font-black py-4 rounded-2xl shadow-lg">Enter Dashboard</button>
                                    <button type="button" onClick={()=>setView('client')} className="w-full text-brand-muted text-xs mt-4">Exit</button>
                                </form>
                            </div>
                        ) : (
                            <div className="max-w-6xl mx-auto">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black">ACTIVE REQUESTS</h2>
                                    <button onClick={()=>setIsAdminLoggedIn(false)} className="px-6 py-2 bg-brand-border rounded-xl font-bold">Logout</button>
                                </div>
                                <div className="overflow-x-auto rounded-[2rem] border border-brand-border shadow-2xl">
                                    <table className="w-full text-left bg-brand-card">
                                        <thead className="bg-[#111] text-[10px] uppercase text-brand-muted tracking-widest">
                                            <tr>
                                                <th className="p-6">Client Details</th>
                                                <th className="p-6">Selected Date</th>
                                                <th className="p-6">Mobile Number</th>
                                                <th className="p-6">Status</th>
                                                <th className="p-6">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-brand-border">
                                            {appointments.map(app => (
                                                <tr key={app.id}>
                                                    <td className="p-6">
                                                        <p className="text-sm font-bold">{app.email}</p>
                                                        <p className="text-[10px] text-brand-muted">ID: {app.id} | TXID: {app.txid}</p>
                                                    </td>
                                                    <td className="p-6 text-sm font-medium">{app.date} (09:30 PM)</td>
                                                    <td className="p-6"><span className="text-brand-accent font-black">+91 {app.phone}</span></td>
                                                    <td className="p-6">
                                                        <span className={`px-3 py-1 rounded-full text-[10px] font-bold uppercase ${app.status === 'Approved' ? 'bg-green-500/10 text-green-500' : 'bg-yellow-500/10 text-brand-accent'}`}>
                                                            {app.status}
                                                        </span>
                                                    </td>
                                                    <td className="p-6">
                                                        <div className="flex gap-2">
                                                            {app.status !== 'Approved' && (
                                                                <button onClick={()=>handleApprove(app.id, app.date)} className="bg-green-600 px-3 py-1 rounded text-[10px] font-bold hover:bg-green-500 transition-colors">APPROVE</button>
                                                            )}
                                                            <button onClick={()=>handleReject(app.id)} className="bg-white/10 px-3 py-1 rounded text-[10px] font-bold hover:bg-red-600 transition-colors">REJECT</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col selection:bg-brand-accent selection:text-black">
                    <Navbar />
                    <main className="flex-grow flex flex-col items-center justify-center px-6 py-16 text-center">
                        <div className="slide-up">
                            <h1 className="text-6xl md:text-[8rem] font-black tracking-tighter mb-4 leading-none uppercase">
                                ASTRO<br/><span className="text-brand-accent italic">VEDA</span>
                            </h1>
                            <p className="text-brand-muted text-lg max-w-xl mx-auto mb-12 font-light leading-relaxed">
                                High-end astrological readings. One exclusive session per day. 
                                <span className="block text-white font-bold mt-2 tracking-widest uppercase">Fixed at 09:30 PM.</span>
                            </p>
                            
                            <div className="max-w-sm mx-auto bg-brand-card p-12 rounded-[3rem] border border-brand-border shadow-2xl relative">
                                <p className="text-brand-muted line-through font-bold text-sm mb-1">₹4,000</p>
                                <h2 className="text-6xl font-black text-white mb-8 tracking-tighter">₹2,000</h2>
                                <button onClick={() => setIsBooking(true)} className="w-full bg-brand-accent text-black font-black py-5 rounded-[1.5rem] hover:scale-105 active:scale-95 transition-all">
                                    Book 9:30 PM Slot
                                </button>
                                <p className="text-[10px] text-brand-muted mt-6 uppercase font-bold tracking-widest">Slots Fill Fast</p>
                            </div>
                        </div>
                    </main>

                    {/* Review Section */}
                    <section id="reviews" className="bg-brand-card border-t border-brand-border py-24 px-6">
                        <div className="max-w-5xl mx-auto">
                            <h3 className="text-2xl font-black mb-12 text-center uppercase tracking-widest">Client Reviews</h3>
                            <div className="grid md:grid-cols-3 gap-8 mb-20">
                                {[
                                    {name: "Aman V.", text: "The accuracy is unmatched. Worth every rupee."},
                                    {name: "Sneha R.", text: "Logical explanations and practical remedies. Excellent."},
                                    {name: "Vikram", text: "The 9:30 PM timing works perfectly for professional schedules."}
                                ].map((rev, i) => (
                                    <div key={i} className="p-8 bg-black rounded-[2.5rem] border border-brand-border">
                                        <p className="text-brand-muted text-sm italic mb-6">"{rev.text}"</p>
                                        <p className="text-brand-accent font-black text-[10px] uppercase tracking-widest">— {rev.name}</p>
                                    </div>
                                ))}
                            </div>
                            <div className="max-w-xl mx-auto bg-[#050505] p-10 rounded-[3rem] border border-brand-border text-center shadow-inner">
                                <p className="text-xs font-bold mb-6 text-brand-muted uppercase tracking-widest">Help us improve</p>
                                <textarea placeholder="Share your experience..." className="w-full bg-black border border-brand-border p-5 rounded-2xl outline-none mb-4 h-32 text-sm focus:border-brand-accent transition-colors"></textarea>
                                <button onClick={() => alert("Review submitted for moderation.")} className="bg-white text-black px-10 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-brand-accent transition-colors">Submit Review</button>
                            </div>
                        </div>
                    </section>

                    <footer className="p-12 text-center border-t border-brand-border text-brand-muted text-[10px] font-bold uppercase tracking-[0.2em]">
                        © 2026 ASTRO VEDA PREMIUM. ALL RIGHTS RESERVED.
                    </footer>

                    {isBooking && <BookingModal />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
