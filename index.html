<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Veda - Premium Astrology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#000000',
                            card: '#0a0a0a',
                            border: '#1f1f1f',
                            accent: '#facc15',
                            muted: '#a1a1aa'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(12px); border: 1px solid #1f1f1f; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.6s ease-out forwards; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .milestone-badge { background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        emailjs.init("8r2tapCdRmVdIbFQb"); 

        function App() {
            const [view, setView] = useState('client');
            const [isBooking, setIsBooking] = useState(false);
            const [step, setStep] = useState(1);
            
            // System States
            const [bookedDates, setBookedDates] = useState(['2026-04-25']); 
            const [appointments, setAppointments] = useState([
                { id: 'AV-7721', email: 'client@example.com', phone: '9898989898', date: '2026-04-25', status: 'Approved', txid: 'TXN12345' }
            ]);

            // Booking Flow States
            const [email, setEmail] = useState('');
            const [phone, setPhone] = useState('');
            const [date, setDate] = useState('');
            const [txid, setTxid] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [generatedOtp, setGeneratedOtp] = useState('');
            const [userOtp, setUserOtp] = useState('');
            const [isSending, setIsSending] = useState(false);

            // Admin States
            const [adminId, setAdminId] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);

            const today = new Date().toISOString().split('T')[0];

            // --- LOGIC ---
            const handleSendOTP = async (e) => {
                e.preventDefault();
                setIsSending(true);
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedOtp(code);
                try {
                    await emailjs.send("service_z2jyz5c", "template_hod7wir", { to_email: email, otp_code: code });
                    setOtpSent(true);
                    setIsSending(false);
                } catch (err) {
                    alert("Verification error.");
                    setIsSending(false);
                }
            };

            const finalizeBooking = () => {
                const newApp = { id: 'AV-' + Math.floor(1000+Math.random()*9000), email, phone, date, status: 'Pending', txid };
                setAppointments([newApp, ...appointments]);
                alert("Success! Admin will review your payment and contact you.");
                setIsBooking(false);
                setStep(1);
                setEmail(''); setPhone(''); setTxid(''); setDate(''); setOtpSent(false);
            };

            const handleApprove = (id, selectedDate) => {
                setAppointments(appointments.map(app => app.id === id ? {...app, status: 'Approved'} : app));
                if (!bookedDates.includes(selectedDate)) setBookedDates([...bookedDates, selectedDate]);
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminId === 'PRATHAM003' && adminPass === 'Pkjewellers155') setIsAdminLoggedIn(true);
                else alert("Invalid Credentials");
            };

            // --- UI COMPONENTS ---
            const MilestoneSection = () => (
                <div className="flex flex-wrap justify-center gap-4 mb-10 slide-up">
                    <div className="milestone-badge px-4 py-2 rounded-full flex items-center gap-2">
                        <span className="text-brand-accent font-bold">30+ Years</span>
                        <span className="text-[10px] text-brand-muted uppercase tracking-tighter">Experience</span>
                    </div>
                    <div className="milestone-badge px-4 py-2 rounded-full flex items-center gap-2">
                        <span className="text-brand-accent font-bold">5000+</span>
                        <span className="text-[10px] text-brand-muted uppercase tracking-tighter">Thriving Lives</span>
                    </div>
                    <div className="milestone-badge px-4 py-2 rounded-full flex items-center gap-2">
                        <span className="text-brand-accent font-bold">Unique Analysis</span>
                        <span className="text-[10px] text-brand-muted uppercase tracking-tighter">Methods</span>
                    </div>
                </div>
            );

            const Navbar = () => (
                <nav className="flex justify-between items-center p-8 max-w-7xl mx-auto w-full">
                    <div className="flex items-center gap-2 cursor-pointer select-none" onDoubleClick={() => setView('admin')} onClick={() => setView('client')}>
                        <div className="w-10 h-10 bg-brand-accent rounded-lg flex items-center justify-center text-black text-2xl shadow-[0_0_20px_rgba(250,204,21,0.3)]">🪐</div>
                        <span className="text-2xl font-black tracking-tighter">ASTRO<span className="text-brand-muted font-light">VEDA</span></span>
                    </div>
                    <div className="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest text-brand-muted">
                        <a href="#reviews" className="hover:text-white transition-colors">Reviews</a>
                        <a href="#" className="hover:text-white transition-colors">Support</a>
                    </div>
                </nav>
            );

            const BookingModal = () => (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
                    <div className="bg-brand-card border border-brand-border rounded-[2rem] w-full max-w-md overflow-hidden slide-up shadow-2xl">
                        <div className="p-6 border-b border-brand-border flex justify-between items-center bg-[#050505]">
                            <h2 className="text-lg font-bold uppercase tracking-widest">Step {step} of 4</h2>
                            <button onClick={() => setIsBooking(false)} className="text-brand-muted">✕</button>
                        </div>

                        <div className="p-8">
                            {step === 1 && (
                                <form onSubmit={otpSent ? (e)=>{e.preventDefault(); if(userOtp===generatedOtp)setStep(2); else alert("Wrong OTP")} : handleSendOTP} className="space-y-4">
                                    <input type="email" required placeholder="Email Address" value={email} onChange={(e)=>setEmail(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl focus:border-brand-accent outline-none" disabled={otpSent}/>
                                    {otpSent && <input type="text" maxLength="6" placeholder="Enter Code" value={userOtp} onChange={(e)=>setUserOtp(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl text-center text-xl tracking-[0.5em] font-bold text-brand-accent"/>}
                                    <button className="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-brand-accent transition-all">
                                        {isSending ? "Processing..." : (otpSent ? "Verify" : "Send Verification Code")}
                                    </button>
                                </form>
                            )}

                            {step === 2 && (
                                <div className="space-y-6 text-center">
                                    <div className="p-4 bg-brand-accent/5 border border-brand-accent/20 rounded-2xl">
                                        <p className="text-[10px] text-brand-accent font-bold uppercase tracking-widest">Fixed Time Slot</p>
                                        <p className="text-3xl font-black">09:30 PM</p>
                                    </div>
                                    <input type="date" min={today} required value={date} onChange={(e)=> {
                                        if(bookedDates.includes(e.target.value)) { alert("Fully Booked!"); setDate(''); } else setDate(e.target.value);
                                    }} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none"/>
                                    <button onClick={()=>date ? setStep(3) : alert("Select Date")} className="w-full bg-white text-black font-black py-4 rounded-2xl">Next</button>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-5 text-center">
                                    <div className="bg-black border border-brand-border p-5 rounded-2xl">
                                        <p className="text-brand-muted text-xs uppercase mb-1">Final Amount</p>
                                        <p className="text-4xl font-black text-brand-accent">₹1,999</p>
                                    </div>
                                    <div className="w-36 h-36 bg-white mx-auto rounded-2xl flex items-center justify-center text-black text-[10px] font-bold uppercase tracking-tighter">UPI QR CODE</div>
                                    <p className="text-[10px] text-brand-muted uppercase font-bold tracking-widest">UPI ID: astroveda@ybl</p>
                                    <input type="text" placeholder="Transaction ID" value={txid} onChange={(e)=>setTxid(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none"/>
                                    <button onClick={()=>txid ? setStep(4) : alert("Enter TXID")} className="w-full bg-brand-accent text-black font-black py-4 rounded-2xl">Confirm Payment</button>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-5">
                                    <div className="text-center">
                                        <h3 className="text-xl font-bold mb-2 uppercase">Contact Info</h3>
                                        <p className="text-xs text-brand-muted">Our expert will call you for the consultation.</p>
                                    </div>
                                    <div className="flex">
                                        <span className="bg-brand-border p-4 rounded-l-2xl text-brand-muted border border-r-0 border-brand-border">+91</span>
                                        <input type="tel" maxLength="10" placeholder="Mobile Number" value={phone} onChange={(e)=>setPhone(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-r-2xl outline-none font-bold tracking-widest"/>
                                    </div>
                                    <button onClick={() => phone.length === 10 ? finalizeBooking() : alert("Invalid number")} className="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-green-500">Finish Booking</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            if (view === 'admin') {
                return (
                    <div className="min-h-screen bg-[#050505] p-6 md:p-12">
                        {!isAdminLoggedIn ? (
                            <div className="max-w-md mx-auto mt-20 p-10 bg-brand-card border border-brand-border rounded-[2.5rem] shadow-2xl">
                                <h2 className="text-2xl font-black mb-6 text-center uppercase tracking-widest">Admin Panel</h2>
                                <form onSubmit={handleAdminLogin} className="space-y-4">
                                    <input type="text" placeholder="ID" value={adminId} onChange={(e)=>setAdminId(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none focus:border-brand-accent"/>
                                    <input type="password" placeholder="PASS" value={adminPass} onChange={(e)=>setAdminPass(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none focus:border-brand-accent"/>
                                    <button className="w-full bg-brand-accent text-black font-black py-4 rounded-2xl shadow-lg">Login</button>
                                    <button type="button" onClick={()=>setView('client')} className="w-full text-brand-muted text-xs font-bold mt-4 uppercase">Return to Site</button>
                                </form>
                            </div>
                        ) : (
                            <div className="max-w-6xl mx-auto">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black italic">CLIENT INTAKE</h2>
                                    <button onClick={()=>setIsAdminLoggedIn(false)} className="px-6 py-2 bg-brand-border rounded-xl font-bold hover:bg-white hover:text-black transition-all">Logout</button>
                                </div>
                                <div className="overflow-x-auto rounded-[2rem] border border-brand-border shadow-2xl">
                                    <table className="w-full text-left bg-brand-card">
                                        <thead className="bg-[#111] text-[10px] uppercase text-brand-muted tracking-[0.2em]">
                                            <tr>
                                                <th className="p-6">Client Info</th>
                                                <th className="p-6">Booked Date</th>
                                                <th className="p-6">Number</th>
                                                <th className="p-6">Payment TXID</th>
                                                <th className="p-6">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-brand-border">
                                            {appointments.map(app => (
                                                <tr key={app.id} className="hover:bg-white/5 transition-colors">
                                                    <td className="p-6">
                                                        <p className="text-sm font-bold">{app.email}</p>
                                                        <p className="text-[10px] text-brand-muted uppercase font-bold tracking-widest">{app.id}</p>
                                                    </td>
                                                    <td className="p-6 text-sm font-medium">{app.date}</td>
                                                    <td className="p-6">
                                                        <span className="bg-brand-accent/10 text-brand-accent px-4 py-2 rounded-lg font-black text-sm">+91 {app.phone}</span>
                                                    </td>
                                                    <td className="p-6 text-xs text-brand-muted font-mono">{app.txid}</td>
                                                    <td className="p-6">
                                                        <div className="flex gap-2">
                                                            {app.status !== 'Approved' ? (
                                                                <button onClick={()=>handleApprove(app.id, app.date)} className="bg-green-600 px-4 py-2 rounded text-[10px] font-bold shadow-lg shadow-green-900/20">APPROVE</button>
                                                            ) : (
                                                                <span className="text-green-500 font-bold text-xs uppercase">✓ Done</span>
                                                            )}
                                                            <button onClick={()=>handleReject(app.id)} className="bg-white/10 px-4 py-2 rounded text-[10px] font-bold">REMOVE</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col selection:bg-brand-accent selection:text-black">
                    <Navbar />
                    <main className="flex-grow flex flex-col items-center justify-center px-6 py-20 text-center">
                        <div className="slide-up">
                            
                            <MilestoneSection />

                            <h1 className="text-5xl md:text-[8rem] font-black tracking-tighter mb-4 leading-none uppercase">
                                PRECISION<br/><span className="text-brand-accent italic">ASTROLOGY</span>
                            </h1>
                            <p className="text-brand-muted text-lg max-w-2xl mx-auto mb-16 font-light leading-relaxed">
                                Get instant clarity with our unique analysis methods that differ from traditional approaches. We provide logical answers to your life's most complex questions.
                            </p>
                            
                            <div className="max-w-sm mx-auto">
                                <div className="bg-brand-card p-12 rounded-[3.5rem] border border-brand-border shadow-[0_0_80px_rgba(250,204,21,0.15)] relative overflow-hidden group hover:border-brand-accent transition-all duration-700">
                                    <div className="absolute top-0 right-10 bg-brand-accent text-black text-[10px] font-black px-4 py-1.5 rounded-b-xl uppercase tracking-widest">Exclusive Deal</div>
                                    <p className="text-brand-muted line-through font-bold text-sm mb-1 opacity-60">₹3,500</p>
                                    <h2 className="text-7xl font-black text-white mb-8 tracking-tighter">₹1,999</h2>
                                    <button onClick={() => setIsBooking(true)} className="w-full bg-brand-accent text-black font-black py-5 rounded-[2rem] hover:scale-105 active:scale-95 transition-all shadow-xl uppercase tracking-widest text-xs">
                                        Book Your Slot
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Review Section */}
                    <section id="reviews" className="bg-brand-card border-t border-brand-border py-28 px-6">
                        <div className="max-w-5xl mx-auto">
                            <h3 className="text-3xl font-black mb-16 text-center uppercase tracking-[0.2em] text-white">Trust from the community</h3>
                            
                            <div className="grid md:grid-cols-3 gap-8 mb-24">
                                {[
                                    {name: "Karan Johar", text: "The methods used are incredibly unique. I've never seen such accurate analysis before."},
                                    {name: "Simran W.", text: "30 years of experience really shows in how they handle delicate questions. Highly recommend."},
                                    {name: "Amit Patel", text: "Finally an astrological service that isn't just generic predictions. Real guidance."}
                                ].map((rev, i) => (
                                    <div key={i} className="p-10 bg-black rounded-[3rem] border border-brand-border hover:border-brand-accent transition-all">
                                        <p className="text-brand-muted text-sm leading-relaxed mb-8 italic">"{rev.text}"</p>
                                        <p className="text-brand-accent font-black text-[10px] uppercase tracking-[0.2em]">Seeker: {rev.name}</p>
                                    </div>
                                ))}
                            </div>

                            <div className="max-w-2xl mx-auto bg-[#050505] p-12 rounded-[3.5rem] border border-brand-border text-center shadow-inner">
                                <h4 className="font-bold mb-2 uppercase tracking-widest">Share Your Experience</h4>
                                <p className="text-xs text-brand-muted mb-8 italic">Help us improve Astro Veda and serve you better.</p>
                                <textarea placeholder="Write your review here..." className="w-full bg-black border border-brand-border p-6 rounded-3xl outline-none mb-6 h-36 text-sm focus:border-brand-accent transition-colors"></textarea>
                                <button onClick={() => alert("Thank you for your feedback!")} className="bg-white text-black px-12 py-4 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-brand-accent transition-colors">Submit Review</button>
                            </div>
                        </div>
                    </section>

                    <footer className="p-12 text-center border-t border-brand-border text-brand-muted text-[10px] font-bold uppercase tracking-[0.3em]">
                        © 2026 ASTRO VEDA PREMIUM. ESTABLISHED 1996.
                    </footer>

                    {isBooking && <BookingModal />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
