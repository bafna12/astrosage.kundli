<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Veda - Premium Astrology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#000000',
                            card: '#0a0a0a',
                            border: '#1f1f1f',
                            accent: '#facc15',
                            muted: '#a1a1aa'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(10px); border: 1px solid #1f1f1f; }
        .animate-smooth { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.5s ease-out forwards; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Initialize EmailJS
        emailjs.init("8r2tapCdRmVdIbFQb"); 

        function App() {
            const [view, setView] = useState('client');
            const [isBooking, setIsBooking] = useState(false);
            const [step, setStep] = useState(1);
            
            // Booking States
            const [email, setEmail] = useState('');
            const [phone, setPhone] = useState('');
            const [date, setDate] = useState('');
            const [txid, setTxid] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [generatedOtp, setGeneratedOtp] = useState('');
            const [userOtp, setUserOtp] = useState('');
            const [isSending, setIsSending] = useState(false);

            // Admin States
            const [adminId, setAdminId] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [appointments, setAppointments] = useState([
                { id: 'AV-9921', email: 'client@example.com', phone: '9988776655', date: '2026-04-20', time: '09:30 PM', status: 'Pending', txid: 'UPI987654' }
            ]);

            const today = new Date().toISOString().split('T')[0];

            // --- LOGIC ---
            const handleSendOTP = async (e) => {
                e.preventDefault();
                setIsSending(true);
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedOtp(code);
                try {
                    await emailjs.send("service_z2jyz5c", "template_hod7wir", { to_email: email, otp_code: code });
                    setOtpSent(true);
                    setIsSending(false);
                } catch (err) {
                    alert("Error sending code. Please check email address.");
                    setIsSending(false);
                }
            };

            const handleVerifyOTP = (e) => {
                e.preventDefault();
                if (userOtp === generatedOtp) setStep(2);
                else alert("Invalid Code");
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminId === 'PRATHAM003' && adminPass === 'Pkjewellers155') setIsAdminLoggedIn(true);
                else alert("Access Denied");
            };

            // --- COMPONENTS ---
            const Navbar = () => (
                <nav className="flex justify-between items-center p-6 max-w-7xl mx-auto w-full">
                    <div className="flex items-center gap-2 cursor-pointer" onDoubleClick={() => setView('admin')} onClick={() => setView('client')}>
                        <div className="w-8 h-8 bg-brand-accent rounded flex items-center justify-center text-black text-xl">🪐</div>
                        <span className="text-xl font-extrabold tracking-tighter">ASTRO<span className="text-brand-muted">VEDA</span></span>
                    </div>
                    <div className="flex gap-6 text-sm font-medium text-brand-muted">
                        <a href="#" className="hover:text-brand-accent animate-smooth">Consultation</a>
                        <a href="#" className="hover:text-brand-accent animate-smooth">Reviews</a>
                    </div>
                </nav>
            );

            const BookingModal = () => (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                    <div className="bg-brand-card border border-brand-border rounded-3xl w-full max-w-md overflow-hidden slide-up shadow-2xl">
                        <div className="p-6 border-b border-brand-border flex justify-between items-center">
                            <h2 className="text-xl font-bold">Secure Booking</h2>
                            <button onClick={() => setIsBooking(false)} className="text-brand-muted">✕</button>
                        </div>

                        <div className="p-8">
                            {step === 1 && (
                                <form onSubmit={otpSent ? handleVerifyOTP : handleSendOTP} className="space-y-4">
                                    <label className="text-xs text-brand-muted uppercase font-bold tracking-widest">Step 1: Verification</label>
                                    <input type="email" required placeholder="Your Email Address" value={email} onChange={(e)=>setEmail(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-xl focus:border-brand-accent outline-none animate-smooth" disabled={otpSent}/>
                                    {otpSent && <input type="text" required placeholder="Enter 6-Digit Code" value={userOtp} onChange={(e)=>setUserOtp(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-xl text-center text-2xl tracking-[1rem] font-bold text-brand-accent"/>}
                                    <button className="w-full bg-white text-black font-black py-4 rounded-xl hover:scale-[1.02] transition-transform">
                                        {isSending ? "Processing..." : (otpSent ? "Continue" : "Get Code")}
                                    </button>
                                </form>
                            )}

                            {step === 2 && (
                                <div className="space-y-6">
                                    <label className="text-xs text-brand-muted uppercase font-bold tracking-widest">Step 2: Schedule</label>
                                    <div>
                                        <p className="text-sm text-brand-muted mb-2">Available Date:</p>
                                        <input type="date" min={today} required value={date} onChange={(e)=>setDate(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-xl text-white outline-none"/>
                                    </div>
                                    <div className="p-4 bg-brand-accent/10 border border-brand-accent/20 rounded-xl">
                                        <p className="text-xs text-brand-accent font-bold mb-1">FIXED TIME SLOT</p>
                                        <p className="text-xl font-black text-white">09:30 PM</p>
                                        <p className="text-[10px] text-brand-muted mt-1">40 Minutes Premium Consultation</p>
                                    </div>
                                    <button onClick={()=>setStep(3)} className="w-full bg-white text-black font-black py-4 rounded-xl">Proceed to Payment</button>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-4 text-center">
                                    <label className="text-xs text-brand-muted uppercase font-bold tracking-widest">Step 3: Payment</label>
                                    <div className="bg-black border border-brand-border p-6 rounded-2xl">
                                        <p className="text-brand-muted text-sm">Amount to Pay</p>
                                        <p className="text-4xl font-black text-brand-accent">₹2,000</p>
                                    </div>
                                    <div className="w-40 h-40 bg-white mx-auto rounded-2xl flex items-center justify-center text-black font-bold">QR CODE</div>
                                    <p className="text-xs font-bold text-brand-muted">UPI ID: astroveda@ybl</p>
                                    <input type="text" placeholder="Enter Transaction ID (TXID)" value={txid} onChange={(e)=>setTxid(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-xl outline-none text-sm"/>
                                    <button onClick={()=>setStep(4)} className="w-full bg-brand-accent text-black font-black py-4 rounded-xl">Confirm Payment</button>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-4">
                                    <div className="text-center mb-6">
                                        <div className="w-16 h-16 bg-green-500/20 text-green-500 rounded-full flex items-center justify-center mx-auto text-2xl mb-4">✓</div>
                                        <h3 className="text-xl font-bold">Payment Recorded!</h3>
                                        <p className="text-sm text-brand-muted">Please provide your mobile number so our astrologer can contact you for the 9:30 PM session.</p>
                                    </div>
                                    <div className="flex">
                                        <span className="bg-brand-border p-4 rounded-l-xl text-brand-muted border border-r-0 border-brand-border">+91</span>
                                        <input type="tel" maxLength="10" placeholder="Mobile Number" value={phone} onChange={(e)=>setPhone(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-r-xl outline-none"/>
                                    </div>
                                    <button onClick={() => { alert("Booking Successful! Admin will approve shortly."); setIsBooking(false); setStep(1); }} className="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-brand-accent transition-colors">Complete Booking</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            if (view === 'admin') {
                return (
                    <div className="min-h-screen bg-black p-4 md:p-10">
                        {!isAdminLoggedIn ? (
                            <div className="max-w-md mx-auto mt-20 p-10 bg-brand-card border border-brand-border rounded-3xl slide-up">
                                <h2 className="text-2xl font-black mb-6 text-center">Admin Access</h2>
                                <form onSubmit={handleAdminLogin} className="space-y-4">
                                    <input type="text" placeholder="Admin ID" value={adminId} onChange={(e)=>setAdminId(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-xl outline-none"/>
                                    <input type="password" placeholder="Password" value={adminPass} onChange={(e)=>setAdminPass(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-xl outline-none"/>
                                    <button className="w-full bg-brand-accent text-black font-black py-4 rounded-xl">Login</button>
                                    <button type="button" onClick={()=>setView('client')} className="w-full text-brand-muted text-sm">Exit</button>
                                </form>
                            </div>
                        ) : (
                            <div className="max-w-6xl mx-auto">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black">Booking Dashboard</h2>
                                    <button onClick={()=>setIsAdminLoggedIn(false)} className="px-6 py-2 bg-brand-border rounded-lg">Logout</button>
                                </div>
                                <div className="overflow-x-auto rounded-2xl border border-brand-border">
                                    <table className="w-full text-left bg-brand-card">
                                        <thead className="bg-brand-border text-xs uppercase text-brand-muted">
                                            <tr>
                                                <th className="p-5">Client</th>
                                                <th className="p-5">Schedule</th>
                                                <th className="p-5">TXID</th>
                                                <th className="p-5">Status</th>
                                                <th className="p-5">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {appointments.map(app => (
                                                <tr key={app.id} className="border-t border-brand-border">
                                                    <td className="p-5 text-sm font-bold">{app.email}<br/><span className="text-brand-accent text-xs">+91 {app.phone}</span></td>
                                                    <td className="p-5 text-sm">{app.date}<br/><span className="text-brand-muted">09:30 PM</span></td>
                                                    <td className="p-5 text-xs text-brand-muted">{app.txid}</td>
                                                    <td className="p-5"><span className="px-3 py-1 bg-yellow-500/10 text-brand-accent rounded-full text-[10px] font-bold uppercase">{app.status}</span></td>
                                                    <td className="p-5 flex gap-2">
                                                        <button className="px-4 py-2 bg-green-600 text-white rounded-md text-xs font-bold">Approve</button>
                                                        <button className="px-4 py-2 bg-red-600/20 text-red-500 rounded-md text-xs font-bold">Reject</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <Navbar />
                    <main className="flex-grow flex flex-col items-center justify-center px-6 py-20 text-center">
                        <div className="slide-up">
                            <h1 className="text-5xl md:text-8xl font-black tracking-tighter mb-6">
                                DIVINE <span className="text-brand-accent">GUIDANCE</span>
                            </h1>
                            <p className="text-brand-muted text-lg md:text-xl max-w-2xl mx-auto mb-10 font-light">
                                Unlock your future with a premium 40-minute consultation. 
                                <span className="block text-brand-accent font-bold mt-2">Daily Session at 09:30 PM Sharp.</span>
                            </p>
                            
                            <div className="max-w-sm mx-auto p-1 bg-gradient-to-b from-brand-accent to-yellow-700 rounded-[2rem] shadow-[0_0_50px_rgba(250,204,21,0.2)]">
                                <div className="bg-brand-card p-10 rounded-[1.9rem]">
                                    <p className="text-brand-muted line-through font-bold">₹4,000</p>
                                    <h2 className="text-6xl font-black text-white mb-6">₹2,000</h2>
                                    <ul className="text-left text-sm space-y-3 mb-8 text-brand-muted">
                                        <li className="flex items-center gap-2">✨ Detailed Birth Chart</li>
                                        <li className="flex items-center gap-2">✨ Career & Wealth Growth</li>
                                        <li className="flex items-center gap-2">✨ Love & Relationship Clarity</li>
                                    </ul>
                                    <button onClick={() => setIsBooking(true)} className="w-full bg-brand-accent text-black font-black py-4 rounded-2xl hover:scale-105 transition-transform shadow-lg">
                                        Book 9:30 PM Slot
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Review Section */}
                    <section className="bg-brand-card border-t border-brand-border py-16 px-6">
                        <div className="max-w-4xl mx-auto text-center">
                            <h3 className="text-2xl font-black mb-8">What our seekers say</h3>
                            <div className="grid md:grid-cols-2 gap-6 mb-12">
                                <div className="p-6 bg-black rounded-2xl border border-brand-border text-left">
                                    <p className="text-brand-muted italic mb-4">"The 9:30 slot is perfect. The predictions were eerily accurate and the remedies actually worked!"</p>
                                    <p className="text-brand-accent font-bold text-sm">- Priya S.</p>
                                </div>
                                <div className="p-6 bg-black rounded-2xl border border-brand-border text-left">
                                    <p className="text-brand-muted italic mb-4">"Finally an astrologer who explains the 'why'. Very professional and smooth experience."</p>
                                    <p className="text-brand-accent font-bold text-sm">- Rahul K.</p>
                                </div>
                            </div>
                            <div className="bg-black p-8 rounded-3xl border border-brand-border max-w-xl mx-auto">
                                <p className="text-sm font-bold mb-4">Help us improve. Leave a review:</p>
                                <textarea placeholder="Share your experience..." className="w-full bg-brand-card border border-brand-border p-4 rounded-xl outline-none mb-4 h-24 text-sm"></textarea>
                                <button onClick={() => alert("Thank you for your feedback!")} className="bg-white text-black px-8 py-2 rounded-lg font-bold text-sm hover:bg-brand-accent transition-colors">Submit Review</button>
                            </div>
                        </div>
                    </section>

                    <footer className="p-10 text-center text-brand-muted text-xs border-t border-brand-border">
                        © 2026 Astro Veda Premium. All rights reserved.
                    </footer>

                    {isBooking && <BookingModal />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
