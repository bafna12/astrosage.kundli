<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Veda - Premium Astrology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#000000',
                            card: '#0a0a0a',
                            border: '#1f1f1f',
                            accent: '#facc15',
                            muted: '#a1a1aa'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border: 1px solid #1f1f1f; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.6s ease-out forwards; }
        
        /* Animated Background Elements */
        .stars-container { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite ease-in-out; }
        .planet { position: absolute; border-radius: 50%; opacity: 0.3; filter: blur(1px); }
        
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-20px) rotate(10deg); } }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .milestone-badge { background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        emailjs.init("8r2tapCdRmVdIbFQb"); 

        function App() {
            const [view, setView] = useState('client');
            const [isBooking, setIsBooking] = useState(false);
            const [step, setStep] = useState(1);
            
            // Core Data
            const [bookedDates, setBookedDates] = useState(['2026-04-25']); 
            const [appointments, setAppointments] = useState([
                { id: 'AV-7721', email: 'client@example.com', phone: '9898989898', date: '2026-04-25', status: 'Approved', txid: 'TXN12345' }
            ]);

            // Form Data
            const [email, setEmail] = useState('');
            const [phone, setPhone] = useState('');
            const [date, setDate] = useState('');
            const [txid, setTxid] = useState('');
            const [otpSent, setOtpSent] = useState(false);
            const [generatedOtp, setGeneratedOtp] = useState('');
            const [userOtp, setUserOtp] = useState('');
            const [isSending, setIsSending] = useState(false);

            const [adminId, setAdminId] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);

            const today = new Date().toISOString().split('T')[0];

            // Background Generator
            const stars = useMemo(() => {
                return [...Array(80)].map((_, i) => ({
                    id: i,
                    top: Math.random() * 100 + '%',
                    left: Math.random() * 100 + '%',
                    size: Math.random() * 2 + 1 + 'px',
                    duration: Math.random() * 3 + 2 + 's'
                }));
            }, []);

            const handleSendOTP = async (e) => {
                e.preventDefault();
                setIsSending(true);
                const code = Math.floor(100000 + Math.random() * 900000).toString();
                setGeneratedOtp(code);
                try {
                    await emailjs.send("service_z2jyz5c", "template_hod7wir", { to_email: email, otp_code: code });
                    setOtpSent(true);
                    setIsSending(false);
                } catch (err) {
                    alert("Email service error.");
                    setIsSending(false);
                }
            };

            const finalizeBooking = () => {
                const newApp = { id: 'AV-' + Math.floor(1000+Math.random()*9000), email, phone, date, status: 'Pending', txid };
                setAppointments([newApp, ...appointments]);
                alert("Booking submitted successfully! Our team will contact you once payment is verified.");
                setIsBooking(false);
                setStep(1);
                setEmail(''); setPhone(''); setTxid(''); setDate(''); setOtpSent(false);
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminId === 'PRATHAM003' && adminPass === 'Pkjewellers155') setIsAdminLoggedIn(true);
                else alert("Access Denied");
            };

            return (
                <div className="min-h-screen relative">
                    {/* Astro Background */}
                    <div className="stars-container">
                        {stars.map(s => (
                            <div key={s.id} className="star" style={{ top: s.top, left: s.left, width: s.size, height: s.size, '--d': s.duration }}></div>
                        ))}
                        <div className="planet w-12 h-12 bg-yellow-900/40" style={{ top: '15%', left: '10%', animation: 'float 6s infinite ease-in-out' }}></div>
                        <div className="planet w-20 h-20 bg-blue-900/30" style={{ top: '60%', right: '15%', animation: 'float 8s infinite reverse' }}></div>
                    </div>

                    <nav className="flex justify-between items-center p-8 max-w-7xl mx-auto w-full z-20 relative">
                        <div className="flex items-center gap-2 cursor-pointer select-none" onDoubleClick={() => setView('admin')} onClick={() => setView('client')}>
                            <div className="w-10 h-10 bg-brand-accent rounded-lg flex items-center justify-center text-black text-2xl">🪐</div>
                            <span className="text-2xl font-black tracking-tighter">ASTRO<span className="text-brand-muted font-light">VEDA</span></span>
                        </div>
                        <div className="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest text-brand-muted">
                            <a href="#reviews" className="hover:text-white transition-colors">Client Feedback</a>
                        </div>
                    </nav>

                    {view === 'admin' ? (
                        <div className="p-6 md:p-12 z-20 relative">
                            {!isAdminLoggedIn ? (
                                <div className="max-w-md mx-auto mt-20 p-10 bg-brand-card border border-brand-border rounded-[2rem] shadow-2xl">
                                    <h2 className="text-2xl font-black mb-6 text-center uppercase">Admin</h2>
                                    <form onSubmit={handleAdminLogin} className="space-y-4">
                                        <input type="text" placeholder="ID" value={adminId} onChange={(e)=>setAdminId(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none focus:border-brand-accent text-white"/>
                                        <input type="password" placeholder="Pass" value={adminPass} onChange={(e)=>setAdminPass(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none focus:border-brand-accent text-white"/>
                                        <button className="w-full bg-brand-accent text-black font-black py-4 rounded-2xl shadow-lg">Login</button>
                                        <button type="button" onClick={()=>setView('client')} className="w-full text-brand-muted text-xs mt-4">Exit</button>
                                    </form>
                                </div>
                            ) : (
                                <div className="max-w-6xl mx-auto">
                                    <div className="flex justify-between items-center mb-10">
                                        <h2 className="text-3xl font-black uppercase">Bookings</h2>
                                        <button onClick={()=>setIsAdminLoggedIn(false)} className="px-6 py-2 bg-brand-border rounded-xl font-bold">Logout</button>
                                    </div>
                                    <div className="overflow-x-auto rounded-[2rem] border border-brand-border bg-brand-card shadow-2xl">
                                        <table className="w-full text-left">
                                            <thead className="bg-[#111] text-[10px] uppercase text-brand-muted tracking-widest border-b border-brand-border">
                                                <tr><th className="p-6">Client</th><th className="p-6">Date</th><th className="p-6">Phone</th><th className="p-6">Payment</th><th className="p-6">Action</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-brand-border">
                                                {appointments.map(app => (
                                                    <tr key={app.id} className="hover:bg-white/5">
                                                        <td className="p-6 text-sm font-bold">{app.email}</td>
                                                        <td className="p-6 text-sm">{app.date}</td>
                                                        <td className="p-6"><span className="text-brand-accent font-black">+91 {app.phone}</span></td>
                                                        <td className="p-6 text-xs text-brand-muted font-mono">{app.txid}</td>
                                                        <td className="p-6">
                                                            <div className="flex gap-2">
                                                                {app.status !== 'Approved' ? (
                                                                    <button onClick={()=>{setAppointments(appointments.map(a => a.id === app.id ? {...a, status: 'Approved'} : a)); setBookedDates([...bookedDates, app.date])}} className="bg-green-600 px-4 py-2 rounded text-[10px] font-bold">APPROVE</button>
                                                                ) : <span className="text-green-500 font-bold">✓ Approved</span>}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    ) : (
                        <>
                            <main className="flex-grow flex flex-col items-center justify-center px-6 py-20 text-center z-10 relative">
                                <div className="slide-up">
                                    <div className="flex flex-wrap justify-center gap-4 mb-10">
                                        <div className="milestone-badge px-4 py-2 rounded-full text-[10px] font-bold text-brand-accent uppercase">30+ Years Experience</div>
                                        <div className="milestone-badge px-4 py-2 rounded-full text-[10px] font-bold text-brand-accent uppercase">5000+ Success Stories</div>
                                        <div className="milestone-badge px-4 py-2 rounded-full text-[10px] font-bold text-brand-accent uppercase">Unique Analysis Method</div>
                                    </div>

                                    <h1 className="text-6xl md:text-[8rem] font-black tracking-tighter mb-4 leading-none uppercase">
                                        PRECISION<br/><span className="text-brand-accent italic">ASTROLOGY</span>
                                    </h1>
                                    <p className="text-brand-muted text-lg max-w-2xl mx-auto mb-16 font-light">
                                        Logical answers to your life's most complex questions. Advanced chart mapping for career, love, and growth.
                                    </p>
                                    
                                    <div className="max-w-sm mx-auto">
                                        <div className="bg-brand-card p-12 rounded-[3.5rem] border border-brand-border shadow-2xl relative overflow-hidden group hover:border-brand-accent transition-all duration-700">
                                            <div className="absolute top-0 right-10 bg-brand-accent text-black text-[10px] font-black px-4 py-1.5 rounded-b-xl uppercase tracking-widest">Limited Offer</div>
                                            <p className="text-brand-muted line-through font-bold text-sm mb-1 opacity-60">₹3,500</p>
                                            <h2 className="text-7xl font-black text-white mb-8 tracking-tighter">₹1,999</h2>
                                            <button onClick={() => setIsBooking(true)} className="w-full bg-brand-accent text-black font-black py-5 rounded-[2rem] hover:scale-105 transition-all shadow-xl uppercase tracking-widest text-xs">
                                                Book Your Slot
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </main>

                            <section id="reviews" className="bg-brand-card border-t border-brand-border py-28 px-6 z-10 relative">
                                <div className="max-w-5xl mx-auto">
                                    <h3 className="text-3xl font-black mb-16 text-center uppercase tracking-widest">What Seekers Say</h3>
                                    <div className="grid md:grid-cols-3 gap-8 mb-24 text-sm">
                                        {[{n:"Rahul V.", t:"Shockingly accurate methods."}, {n:"Sanya M.", t:"The only logical astrologer out there."}, {n:"Deepak", t:"Worth 10x the price."}].map((r,i)=>(
                                            <div key={i} className="p-8 bg-black rounded-[2.5rem] border border-brand-border">
                                                <p className="text-brand-muted italic mb-4">"{r.t}"</p>
                                                <p className="text-brand-accent font-bold uppercase tracking-widest">— {r.n}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="max-w-xl mx-auto bg-[#050505] p-10 rounded-[3rem] border border-brand-border text-center">
                                        <p className="text-xs font-bold mb-6 text-brand-muted uppercase">Help us improve</p>
                                        <textarea placeholder="Write a review..." className="w-full bg-black border border-brand-border p-5 rounded-2xl outline-none mb-4 h-32 text-sm text-white focus:border-brand-accent"></textarea>
                                        <button onClick={() => alert("Thank you!")} className="bg-white text-black px-12 py-3 rounded-xl font-black uppercase text-xs">Submit</button>
                                    </div>
                                </div>
                            </section>
                        </>
                    )}

                    <footer className="p-12 text-center text-brand-muted text-[10px] font-bold uppercase tracking-widest border-t border-brand-border">
                        © 2026 ASTRO VEDA PREMIUM
                    </footer>

                    {isBooking && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl overflow-y-auto">
                            <div className="bg-brand-card border border-brand-border rounded-[2.5rem] w-full max-w-md my-auto slide-up shadow-2xl relative">
                                <div className="p-6 border-b border-brand-border flex justify-between items-center bg-[#050505]">
                                    <h2 className="text-sm font-bold uppercase tracking-widest">Appointment Step {step}</h2>
                                    <button onClick={() => setIsBooking(false)} className="text-brand-muted">✕</button>
                                </div>

                                <div className="p-8">
                                    {step === 1 && (
                                        <div className="space-y-4">
                                            <input type="email" placeholder="Your Email Address" value={email} onChange={(e)=>setEmail(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl outline-none focus:border-brand-accent text-white" />
                                            {otpSent && <input type="text" maxLength="6" placeholder="OTP Code" value={userOtp} onChange={(e)=>setUserOtp(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl text-center text-xl font-bold tracking-[0.5em] text-brand-accent" />}
                                            <button onClick={otpSent ? ()=>{if(userOtp===generatedOtp)setStep(2); else alert("Wrong OTP");} : handleSendOTP} className="w-full bg-white text-black font-black py-4 rounded-2xl">
                                                {isSending ? "Processing..." : (otpSent ? "Continue" : "Send OTP")}
                                            </button>
                                        </div>
                                    )}

                                    {step === 2 && (
                                        <div className="space-y-4 text-center">
                                            <p className="text-[10px] text-brand-accent font-bold uppercase tracking-widest">Fixed Time: 09:30 PM</p>
                                            <input type="date" min={today} required value={date} onChange={(e)=> { if(bookedDates.includes(e.target.value)) alert("Already Booked!"); else setDate(e.target.value); }} className="w-full bg-black border border-brand-border p-4 rounded-2xl text-white outline-none" />
                                            <button onClick={()=>date ? setStep(3) : alert("Pick a date")} className="w-full bg-white text-black font-black py-4 rounded-2xl">Next</button>
                                        </div>
                                    )}

                                    {step === 3 && (
                                        <div className="space-y-5 text-center">
                                            <div className="bg-black border border-brand-border p-4 rounded-2xl">
                                                <p className="text-brand-muted text-[10px] uppercase mb-1">Final Amount</p>
                                                <p className="text-3xl font-black text-brand-accent tracking-tighter">₹1,999</p>
                                            </div>
                                            <div className="bg-white p-2 rounded-2xl w-48 h-48 mx-auto overflow-hidden flex items-center justify-center">
                                                {/* INTEGRATED QR IMAGE */}
                                                <img src="https://i.ibb.co/LzdX8Zt/Whats-App-Image-2026-04-20-at-3-01-01-PM.jpg" alt="Payment QR" className="max-w-full max-h-full" />
                                            </div>
                                            <p className="text-[10px] text-brand-muted font-bold">UPI ID: bafna4955@okaxis</p>
                                            <div className="space-y-3">
                                                <input type="text" placeholder="Enter Transaction ID (TXID)" value={txid} onChange={(e)=>setTxid(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-2xl text-xs outline-none focus:border-brand-accent text-white" />
                                                <div className="relative">
                                                    <label className="text-[10px] text-brand-muted block mb-2 uppercase">Upload Payment Screenshot</label>
                                                    <input type="file" accept="image/*" className="text-xs text-brand-muted file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-brand-border file:text-white" />
                                                </div>
                                            </div>
                                            <button onClick={()=>txid ? setStep(4) : alert("Enter TXID")} className="w-full bg-brand-accent text-black font-black py-4 rounded-2xl">Next</button>
                                        </div>
                                    )}

                                    {step === 4 && (
                                        <div className="space-y-5 text-center">
                                            <h3 className="text-xl font-bold uppercase">Phone Number</h3>
                                            <div className="flex shadow-lg">
                                                <span className="bg-brand-border p-4 rounded-l-2xl text-brand-muted border-brand-border">+91</span>
                                                <input type="tel" maxLength="10" placeholder="10 Digit Number" value={phone} onChange={(e)=>setPhone(e.target.value)} className="w-full bg-black border border-brand-border p-4 rounded-r-2xl outline-none font-bold text-white tracking-widest" />
                                            </div>
                                            <button onClick={() => phone.length === 10 ? finalizeBooking() : alert("Enter valid number")} className="w-full bg-white text-black font-black py-4 rounded-2xl">Finish Booking</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
